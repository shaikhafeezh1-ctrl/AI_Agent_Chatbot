version: "3.9"

services:
  backend:
    build: .
    container_name: ai_agent_backend
    command: uvicorn backend:app --host 0.0.0.0 --port 9999
    ports:
      - "9999:9999"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: .
    container_name: ai_agent_frontend
    command: streamlit run frontend.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped